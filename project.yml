name: ClipStory
options:
  bundleIdPrefix: com.vladbabic
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    # Apple Developer team ID (Vladimir Babic — from the Apple Development cert in the keychain)
    DEVELOPMENT_TEAM: DY4JMWWW5S
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CURRENT_PROJECT_VERSION: 5
    MARKETING_VERSION: 1.0.4

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.3

targets:
  ClipStory:
    type: application
    platform: macOS
    sources:
      - path: Shared
      - path: macOS
        excludes:
          - "Info.plist"
          - "*.entitlements"
    info:
      path: macOS/Info.plist
      properties:
        CFBundleDisplayName: ClipStory
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: ""
        SUFeedURL: https://github.com/Vladimirbabic/clip-island/releases/latest/download/appcast.xml
        SUPublicEDKey: yD/iIqArwB8D0y+r2fl0MUoGkF6NY5sGmm4UqllEbLk=
        SUEnableInstallerLauncherService: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vladbabic.clipstory
        CODE_SIGN_ENTITLEMENTS: macOS/ClipStory.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: Sparkle

  ClipStory-iOS:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: iOS
        excludes:
          - "Info.plist"
          - "*.entitlements"
    info:
      path: iOS/Info.plist
      properties:
        CFBundleDisplayName: ClipStory
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIBackgroundModes: [remote-notification]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vladbabic.clipstory.ios
        CODE_SIGN_ENTITLEMENTS: iOS/ClipStory-iOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: ClipStoryShareExtension
        embed: true

  ClipStoryShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Shared
      - path: iOSShareExtension
        excludes:
          - "Info.plist"
          - "*.entitlements"
    info:
      path: iOSShareExtension/Info.plist
      properties:
        CFBundleDisplayName: ClipStory
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsFileWithMaxCount: 10
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 10
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vladbabic.clipstory.ios.ShareExtension
        CODE_SIGN_ENTITLEMENTS: iOSShareExtension/ClipStoryShareExtension.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        TARGETED_DEVICE_FAMILY: "1,2"

  ClipStoryTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Shared
      - path: Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.vladbabic.clipstory.tests

schemes:
  ClipStory:
    build:
      targets:
        ClipStory: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClipStoryTests
  ClipStory-iOS:
    build:
      targets:
        ClipStory-iOS: all
        ClipStoryShareExtension: all
    run:
      config: Debug
