name: ClipStory
options:
  bundleIdPrefix: com.vladbabic
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    # Apple Developer team ID (Vladimir Babic — from the Apple Development cert in the keychain)
    DEVELOPMENT_TEAM: DY4JMWWW5S
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0

targets:
  ClipStory:
    type: application
    platform: macOS
    sources:
      - path: Shared
      - path: macOS
        excludes:
          - "Info.plist"
          - "*.entitlements"
    info:
      path: macOS/Info.plist
      properties:
        CFBundleDisplayName: ClipStory
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vladbabic.clipstory
        CODE_SIGN_ENTITLEMENTS: macOS/ClipStory.entitlements
        COMBINE_HIDPI_IMAGES: YES

  ClipStory-iOS:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: iOS
        excludes:
          - "Info.plist"
          - "*.entitlements"
    info:
      path: iOS/Info.plist
      properties:
        CFBundleDisplayName: ClipStory
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIBackgroundModes: [remote-notification]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vladbabic.clipstory.ios
        CODE_SIGN_ENTITLEMENTS: iOS/ClipStory-iOS.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"

  ClipStoryTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Shared
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vladbabic.clipstory.tests

schemes:
  ClipStory:
    build:
      targets:
        ClipStory: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClipStoryTests
  ClipStory-iOS:
    build:
      targets:
        ClipStory-iOS: all
    run:
      config: Debug
